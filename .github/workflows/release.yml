name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Create module zip
        run: |
          zip -r led_controller_v${{ steps.get_version.outputs.VERSION }}.zip * \
            -x ".git/*" ".github/*" "README.md" "CHANGELOG.md" "LICENSE"
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: led_controller_v${{ steps.get_version.outputs.VERSION }}.zip
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
